<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>旅途记录</title>
    <style>
        :root {
            --bg: #fff;
            --bg2: #f7f7f5;
            --bg3: #eeecea;
            --border: rgba(0, 0, 0, 0.09);
            --border2: rgba(0, 0, 0, 0.16);
            --text: #1a1a18;
            --text2: #5c5c58;
            --text3: #9c9c96;
            --r: 12px;
            --rsm: 8px;
            --sw: 172px;
            --th: 56px;
            --green: #1D9E75;
            --green-bg: #EAF3DE;
            --green-t: #2a6b1a;
            --amber: #BA7517;
            --amber-bg: #FAEEDA;
            --amber-t: #7a4a08;
            --blue: #378ADD;
            --blue-bg: #E6F1FB;
            --blue-t: #185FA5;
            --gray: #888780;
            --gray-bg: #F1EFE8;
            --gray-t: #4a4a46;
            --pink: #D4537E;
            --pink-bg: #FBEAF0;
            --pink-t: #7a2040;
            --red: #E24B4A;
            --red-bg: #FCEBEB;
            --red-t: #8a1f1e;
            --gold: #C78A1C;
            --gold-bg: #FDF3DC;
            --gold-t: #6b4208;
            --purple: #7B4FBF;
            --purple-bg: #F2EAFC;
            --purple-t: #3d1f6e;
        }
        @media(prefers-color-scheme:dark) {
            :root {
                --bg: #1c1c1a;
                --bg2: #242422;
                --bg3: #2c2c2a;
                --border: rgba(255, 255, 255, 0.09);
                --border2: rgba(255, 255, 255, 0.18);
                --text: #f0f0ec;
                --text2: #aaa9a3;
                --text3: #686864;
                --green-bg: #0e3020;
                --green-t: #6ecfa4;
                --amber-bg: #3a2408;
                --amber-t: #f0b84a;
                --blue-bg: #0b2840;
                --blue-t: #7dbcf0;
                --gray-bg: #282826;
                --gray-t: #aaa9a3;
                --pink-bg: #38101e;
                --pink-t: #f0829a;
                --red-bg: #381010;
                --red-t: #f08080;
                --gold-bg: #3a2808;
                --gold-t: #e0b84a;
                --purple-bg: #201030;
                --purple-t: #b890e8;
            }
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        html,
        body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg2);
            color: var(--text);
            font-size: 16px;
            line-height: 1.6;
        }
        button {
            font-family: inherit;
            cursor: pointer;
        }
        .app {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            max-width: 900px;
            margin: 0 auto;
            background: var(--bg);
            box-shadow: 0 0 0 0.5px var(--border);
        }
        .topbar {
            height: var(--th);
            min-height: var(--th);
            display: flex;
            align-items: center;
            padding: 0 14px;
            gap: 8px;
            border-bottom: 0.5px solid var(--border);
            background: var(--bg);
            z-index: 10;
            flex-shrink: 0;
            overflow-x: auto;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            flex-shrink: 0;
        }
        .tab-strip {
            display: flex;
            gap: 2px;
            margin-left: auto;
            background: var(--bg2);
            border-radius: 8px;
            padding: 3px;
            overflow-x: auto;
            scrollbar-width: none;
            flex-shrink: 0;
        }
        .tab-strip::-webkit-scrollbar {
            display: none;
        }
        .tbtn {
            font-size: 14px;
            padding: 8px 14px;
            border-radius: 8px;
            border: none;
            color: var(--text2);
            background: none;
            transition: all .15s;
            white-space: nowrap;
        }
        .tbtn.active {
            background: var(--bg);
            color: var(--text);
            font-weight: 500;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .07);
        }
        .body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .sidebar {
            width: var(--sw);
            min-width: var(--sw);
            border-right: 0.5px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 6px;
            flex-shrink: 0;
        }
        .ss {
            font-size: 10px;
            font-weight: 600;
            color: var(--text3);
            padding: 10px 6px 3px;
            letter-spacing: .07em;
            text-transform: uppercase;
        }
        .si {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 6px 7px;
            border-radius: var(--rsm);
            cursor: pointer;
            font-size: 12.5px;
            color: var(--text2);
            transition: all .12s;
        }
        .si:hover,
        .si.on {
            background: var(--bg2);
            color: var(--text);
        }
        .si.on {
            font-weight: 500;
        }
        .sbar {
            width: 3px;
            height: 14px;
            border-radius: 2px;
            flex-shrink: 0;
        }
        .content {
            flex: 1;
            overflow-y: auto;
            position: relative;
        }
        .view {
            display: none;
            padding: 14px 14px 100px;
        }
        .view.active {
            display: block;
        }
        .pc {
            border: 0.5px solid var(--border);
            border-radius: var(--r);
            margin-bottom: 9px;
            display: flex;
            overflow: hidden;
        }
        .stbar {
            width: 4px;
            flex-shrink: 0;
        }
        .pbody {
            flex: 1;
            min-width: 0;
        }
        .phdr {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 10px 12px;
            cursor: pointer;
            transition: background .12s;
            user-select: none;
        }
        .phdr:hover {
            background: var(--bg2);
        }
        .chev {
            font-size: 9px;
            color: var(--text3);
            transition: transform .2s;
            flex-shrink: 0;
            pointer-events: none;
        }
        .chev.open {
            transform: rotate(90deg);
        }
        .pname {
            font-size: 13px;
            font-weight: 500;
            flex: 1;
            color: var(--text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            pointer-events: none;
        }
        .pmeta {
            font-size: 11px;
            color: var(--text3);
            white-space: nowrap;
            pointer-events: none;
        }
        .spill {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 20px;
            border: none;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            transition: opacity .15s;
            white-space: nowrap;
            position: relative;
            z-index: 2;
        }
        .spill:hover {
            opacity: .75;
        }
        .ptasks {
            display: none;
            border-top: 0.5px solid var(--border);
        }
        .ptasks.open {
            display: block;
        }
        .tr {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 12px;
            cursor: pointer;
            transition: all .2s;
            border-bottom: 0.5px solid var(--border);
            overflow: hidden;
        }
        .tr .stbar {
            width: 4px;
            flex-shrink: 0;
            margin-left: -12px;
            margin-right: 8px;
        }
        .tr:last-child {
            border-bottom: none;
        }
        .tr:hover {
            background: var(--bg2);
        }
        .tr.done-row {
            opacity: 0.7;
            transform: scale(0.98);
        }
        .sc.done-row {
            opacity: 0.6;
        }
        .early-complete {
            font-size: 10px;
            padding: 2px 7px;
            border-radius: 20px;
            background: var(--green-bg);
            color: var(--green-t);
            font-weight: 500;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .chk {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid var(--border2);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .15s;
            pointer-events: auto;
        }
        .chk.done {
            background: var(--blue);
            border-color: var(--blue);
        }
        .chk.done::after {
            content: '';
            width: 8px;
            height: 5px;
            border-left: 2px solid #fff;
            border-bottom: 2px solid #fff;
            transform: rotate(-45deg) translateY(-1px);
            display: block;
        }
        .chk.completing {
            animation: chkBounce 0.4s ease;
        }
        .chk.completing::after {
            animation: checkDraw 0.3s ease;
        }
        @keyframes chkBounce {
            0%, 100% { transform: scale(1); }
            30% { transform: scale(1.15); }
            60% { transform: scale(0.95); }
        }
        @keyframes checkDraw {
            0% { width: 0; height: 0; opacity: 0; }
            50% { opacity: 1; }
        }
        .tname {
            font-size: 15px;
            color: var(--text);
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            pointer-events: none;
            line-height: 1.4;
            max-width: calc(100% - 180px);
        }
        .tname.done {
            text-decoration: line-through;
            color: var(--text3);
        }
        .urg {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
            flex-shrink: 0;
            font-weight: 500;
            pointer-events: none;
        }
        .u-high {
            background: var(--red-bg);
            color: var(--red-t);
        }
        .u-mid {
            background: var(--amber-bg);
            color: var(--amber-t);
        }
        .u-low {
            background: var(--green-bg);
            color: var(--green-t);
        }
        .sc {
            border: 0.5px solid var(--border);
            border-radius: var(--r);
            margin-bottom: 7px;
            display: flex;
            overflow: hidden;
        }
        .scb {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            cursor: pointer;
            transition: background .12s;
        }
        .scb:hover {
            background: var(--bg2);
        }
        .sl {
            font-size: 10px;
            font-weight: 600;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: .07em;
            margin: 16px 0 8px;
        }
        .today-hdr {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 14px;
        }
        .word-checkin-card {
            display: flex;
            gap: 16px;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            color: #fff;
            margin-bottom: 16px;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        .word-checkin-info {
            flex: 1;
        }
        .word-checkin-title {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 6px;
        }
        .word-checkin-word {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .word-checkin-meaning {
            font-size: 13px;
            opacity: 0.9;
            margin-bottom: 4px;
        }
        .word-checkin-desc {
            font-size: 12px;
            opacity: 0.8;
        }
        .word-checkin-action {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            min-width: 100px;
        }
        .word-checkin-stats {
            display: flex;
            gap: 16px;
            text-align: center;
        }
        .word-checkin-stat-num {
            font-size: 20px;
            font-weight: 700;
        }
        .word-checkin-stat-label {
            font-size: 10px;
            opacity: 0.8;
        }
        .word-checkin-btn {
            padding: 8px 20px;
            border-radius: 20px;
            border: none;
            background: #fff;
            color: #667eea;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .word-checkin-btn:hover {
            transform: scale(1.05);
        }
        .word-checkin-btn.checked-in {
            background: rgba(255, 255, 255, 0.3);
            color: #fff;
        }
        .tday-d {
            font-size: 22px;
            font-weight: 600;
        }
        .tday-s {
            font-size: 12px;
            color: var(--text3);
        }
        .task-due {
            font-size: 10px;
            color: var(--text3);
            margin-left: 4px;
            white-space: nowrap;
            pointer-events: none;
        }
        .task-due.overdue {
            color: var(--red-t);
            font-weight: 500;
        }
        .section-header {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            user-select: none;
            padding: 4px 0;
        }
        .section-header .chev {
            transition: transform .2s;
        }
        .section-header .chev.open {
            transform: rotate(90deg);
        }
        .section-body {
            display: block;
        }
        .section-body.collapsed {
            display: none;
        }
        .streak {
            font-size: 11px;
            color: var(--text3);
            margin-left: auto;
            white-space: nowrap;
            pointer-events: none;
        }
        .cal-nav {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        .cal-m {
            font-size: 15px;
            font-weight: 600;
            flex: 1;
        }
        .cnbtn {
            width: 28px;
            height: 28px;
            border-radius: var(--rsm);
            border: 0.5px solid var(--border);
            background: none;
            color: var(--text2);
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .12s;
        }
        .cnbtn:hover {
            background: var(--bg2);
        }
        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
            margin-bottom: 14px;
        }
        .cdow {
            font-size: 10px;
            font-weight: 600;
            color: var(--text3);
            text-align: center;
            padding: 3px 0;
            letter-spacing: .04em;
        }
        .cday {
            border-radius: var(--rsm);
            padding: 4px 2px 5px;
            min-height: 46px;
            cursor: pointer;
            border: 0.5px solid transparent;
            transition: all .12s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }
        .cday:hover {
            background: var(--bg2);
        }
        .cday.other .cnum {
            opacity: .3;
        }
        .cday.today .cnum {
            background: var(--blue);
            color: #fff;
        }
        .cday.selected {
            border-color: var(--blue);
            background: var(--blue-bg);
        }
        .cday.has-tasks {
            border-color: var(--border);
        }
        .cday.has-checkin {
            background: rgba(102, 126, 234, 0.1);
            border-color: rgba(102, 126, 234, 0.3);
        }
        .cday.has-checkin.today {
            background: rgba(102, 126, 234, 0.2);
        }
        .ccheckin {
            font-size: 10px;
            color: #667eea;
            font-weight: 700;
        }
        .cnum {
            font-size: 12px;
            font-weight: 500;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: var(--text);
        }
        .cdots {
            display: flex;
            gap: 2px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 30px;
        }
        .cdot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
        }
        .cal-detail {
            border: 0.5px solid var(--border);
            border-radius: var(--r);
            overflow: hidden;
            position: relative;
            z-index: 110;
        }
        .cdh {
            padding: 10px 14px;
            background: var(--bg2);
            border-bottom: 0.5px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
            z-index: 2;
        }
        .cdh-date {
            font-size: 13px;
            font-weight: 500;
            flex: 1;
        }
        .cdh-add {
            font-size: 11px;
            padding: 6px 14px;
            border-radius: 20px;
            border: 0.5px solid var(--border2);
            background: none;
            color: var(--text2);
            transition: all .12s;
            min-height: 32px;
            min-width: 80px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .cdh-add:active {
            transform: scale(0.95);
            background: var(--bg3);
        }
        .cdh-add:hover {
            background: var(--bg3);
        }
        .cdempty {
            padding: 16px 14px;
            font-size: 12.5px;
            color: var(--text3);
            text-align: center;
        }
        .od-hero {
            border-radius: var(--r);
            padding: 16px;
            margin-bottom: 14px;
            background: var(--red-bg);
            border: 0.5px solid rgba(226, 75, 74, .18);
            display: flex;
            gap: 14px;
            align-items: center;
        }
        .od-num {
            font-size: 28px;
            font-weight: 700;
            color: var(--red-t);
            line-height: 1;
        }
        .od-sub {
            font-size: 11px;
            color: var(--red-t);
            opacity: .75;
            margin-top: 2px;
        }
        .od-oldest {
            text-align: right;
            margin-left: auto;
        }
        .od-oldest-n {
            font-size: 14px;
            font-weight: 600;
            color: var(--red-t);
        }
        .od-oldest-l {
            font-size: 10px;
            color: var(--red-t);
            opacity: .7;
            margin-bottom: 2px;
        }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }
        .stat-c {
            background: var(--bg2);
            border-radius: var(--r);
            padding: 12px 10px;
            text-align: center;
        }
        .stat-n {
            font-size: 20px;
            font-weight: 600;
        }
        .stat-l {
            font-size: 10px;
            color: var(--text3);
            margin-top: 2px;
        }
        .og {
            margin-bottom: 14px;
        }
        .og-hdr {
            display: flex;
            align-items: center;
            gap: 7px;
            margin-bottom: 7px;
        }
        .og-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--text2);
        }
        .og-cnt {
            font-size: 10px;
            padding: 1px 7px;
            border-radius: 20px;
            background: var(--red-bg);
            color: var(--red-t);
            font-weight: 500;
        }
        .oc {
            border: 0.5px solid var(--border);
            border-radius: var(--r);
            margin-bottom: 6px;
            display: flex;
            overflow: hidden;
            transition: opacity .25s, transform .25s;
        }
        .oc-bar {
            width: 4px;
            flex-shrink: 0;
            background: var(--red);
        }
        .oc-body {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 8px 12px;
            flex-wrap: wrap;
        }
        .oc-name {
            font-size: 12.5px;
            color: var(--text);
            flex: 1;
            min-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .oc-days {
            font-size: 10px;
            color: var(--red-t);
            white-space: nowrap;
        }
        .rescue {
            font-size: 11px;
            padding: 3px 9px;
            border-radius: 20px;
            border: 0.5px solid var(--border2);
            background: none;
            color: var(--text2);
            white-space: nowrap;
            transition: all .15s;
        }
        .rescue:hover {
            background: var(--blue-bg);
            color: var(--blue-t);
            border-color: var(--blue);
        }
        .od-empty {
            text-align: center;
            padding: 36px 20px;
        }
        .od-empty-icon {
            font-size: 36px;
            margin-bottom: 10px;
        }
        .od-empty-t {
            font-size: 14px;
            font-weight: 500;
            color: var(--text2);
            margin-bottom: 4px;
        }
        .od-empty-s {
            font-size: 12px;
            color: var(--text3);
        }
        .ng {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 9px;
        }
        .nc {
            border: 0.5px solid var(--border);
            border-radius: var(--r);
            display: flex;
            overflow: hidden;
            cursor: pointer;
            transition: box-shadow .15s;
            position: relative;
        }
        .nc:hover {
            box-shadow: 0 2px 8px rgba(0, 0, 0, .07);
        }
        .nc-b {
            width: 3px;
            flex-shrink: 0;
        }
        .nc-i {
            flex: 1;
            padding: 11px 11px 11px 9px;
            min-width: 0;
        }
        .nc-time {
            font-size: 10px;
            color: var(--text3);
            margin-bottom: 4px;
        }
        .nc-txt {
            font-size: 12px;
            color: var(--text2);
            line-height: 1.5;
            margin-bottom: 7px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .nc-tag {
            font-size: 10px;

                { id: 'a6', icon: '🎖️', name: '项目完成者', desc: '完成一个完整项目', condition: 'projDone', unlocked: false },
                { id: 'a7', icon: '🦀', name: 'Rust学徒', desc: 'Rust学习项目完成过半', condition: 'rustHalf', unlocked: false },
                { id: 'a8', icon: '👑', name: '任务大师', desc: '累计完成50个任务', condition: 'finish50', unlocked: false },
                { id: 'a9', icon: '🌟', name: '完美一周', desc: '一周内每天都有完成', condition: 'perfectWeek', unlocked: false },
                { id: 'a10', icon: '🗑️', name: '清道夫', desc: '处理所有逾期任务', condition: 'overdueFix', unlocked: false },
                { id: 'a11', icon: '💪', name: '行动派', desc: '完成健身相关任务3个', condition: 'fit3', unlocked: false },
                { id: 'a12', icon: '⭐', name: '早起鸟儿', desc: '在早上完成10个任务', condition: 'morning10', unlocked: false },
            ],
            customAchievements: [],
            completedOverdueTasks: [],
            wordCheckins: [],
        };

        let db = JSON.parse(JSON.stringify(DEFAULT_DATA));

        function loadDB() { try { const raw = localStorage.getItem(DB_KEY); if (raw) { const saved = JSON.parse(raw); db.projects = saved.projects || db.projects; db.tasks = saved.tasks || db.tasks; db.notes = saved.notes || db.notes; db.achievements = saved.achievements || db.achievements; db.customAchievements = saved.customAchievements || []; db.completedOverdueTasks = saved.completedOverdueTasks || []; db.calTasks = saved.calTasks || {}; } } catch(e) { console.warn(e); } }
        function saveDB() { try { localStorage.setItem(DB_KEY, JSON.stringify({ projects: db.projects, tasks: db.tasks, notes: db.notes, calTasks: db.calTasks, achievements: db.achievements, customAchievements: db.customAchievements, completedOverdueTasks: db.completedOverdueTasks, wordCheckins: db.wordCheckins || [] })); } catch(e) {} }
        loadDB();
        if (!db.wordCheckins) db.wordCheckins = [];

        function genId() { return 'id_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7); }
        function getProject(id) { return db.projects.find(p => p.id === id); }
        function getProjectColor(id) { const p = getProject(id); return p ? p.color : 'var(--pink)'; }
        function getProjectName(id) { const p = getProject(id); return p ? p.name : '独立任务'; }
        function formatTime(iso) { if (!iso) return ''; const d = new Date(iso); return (d.getMonth() + 1) + '/' + d.getDate() + ' ' + d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0'); }
        function urgClass(u) { return u === 'high' ? 'high' : u === 'mid' ? 'mid' : 'low'; }
        function urgLabel(u) { return u === 'high' ? '紧急' : u === 'mid' ? '中' : '低'; }
        function ck(y, m, d) { return y + '-' + String(m + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0'); }
        function isOverdue(task) { if (!task.deadline) return false; return new Date(task.deadline + 'T00:00:00') < today && getOverdueDays(task) > 0; }
        function getOverdueDays(task) { if (!task.deadline) return 0; const dl = new Date(task.deadline + 'T00:00:00'); return Math.floor((today - dl) / (1000 * 60 * 60 * 24)); }
        function getDaysUntil(deadline) { if (!deadline) return Infinity; const dl = new Date(deadline + 'T00:00:00'); return Math.floor((dl - today) / (1000 * 60 * 60 * 24)); }
        function toast(msg) { const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2000); }
        function showAchievement(a) { toast('🏆 解锁成就：' + a.name); }
        
        function calculateWordStreak() {
            if (!db.wordCheckins || db.wordCheckins.length === 0) return 0;
            const sorted = [...db.wordCheckins].sort().reverse();
            let streak = 0;
            let checkDate = new Date(today);
            for (let i = 0; i < 365; i++) {
                const dateStr = checkDate.toISOString().split('T')[0];
                if (sorted.includes(dateStr)) {
                    streak++;
                    checkDate.setDate(checkDate.getDate() - 1);
                } else {
                    break;
                }
            }
            return streak;
        }
        
        window.toggleWordCheckin = function() {
            if (!db.wordCheckins) db.wordCheckins = [];
            const todayKey = today.toISOString().split('T')[0];
            if (db.wordCheckins.includes(todayKey)) {
                db.wordCheckins = db.wordCheckins.filter(d => d !== todayKey);
                toast('取消打卡');
            } else {
                db.wordCheckins.push(todayKey);
                toast('打卡成功！');
            }
            saveDB();
            refreshAll();
        };

        function syncAllCalTasks() {
            db.calTasks = {};
            db.tasks.forEach(t => {
                if (t.deadline) {
                    const d = new Date(t.deadline + 'T00:00:00');
                    const key = ck(d.getFullYear(), d.getMonth(), d.getDate());
                    if (!db.calTasks[key]) db.calTasks[key] = [];
                    db.calTasks[key].push({ name: t.name, urgency: t.urgency, done: t.done, taskId: t.id });

            });
            saveDB();

            return `<div class="sc ${t.done ? 'done-row' : ''}"><div class="stbar" style="background:${pc}"></div><div class="scb" data-task-id="${t.id}"><div class="chk${t.done ? ' done' : ''}"></div><span class="tname${t.done ? ' done' : ''}">${t.name}</span><span class="urg u-${urgClass(t.urgency)}">${urgLabel(t.urgency)}</span>${dueText ? `<span class="task-due${isOverdueFlag ? ' overdue' : ''}">${dueText}</span>` : ''}${earlyCompleteTag}<div class="task-actions"><button class="task-edit-btn" data-edit-task-id="${t.id}">✎</button><button class="task-del-btn" data-delete-task-id="${t.id}">✕</button></div></div></div>`;
        }

        function isEarlyComplete(task) {
            if (!task.done || !task.deadline) return false;
            const deadline = new Date(task.deadline + 'T00:00:00');
            return today < deadline;
        }
        function isEarlyCompleteForCal(task, deadline) {
            if (!task.done) return false;
            const deadlineDate = new Date(deadline + 'T00:00:00');
            return today < deadlineDate;
        }

        function renderToday() {
            const container = document.getElementById('view-today');
            const allTasks = [...db.tasks];
            const dailyTasks = allTasks.filter(t => t.daily);
            const nonDailyTasks = allTasks.filter(t => !t.daily);
            const overdue = nonDailyTasks.filter(t => {
                if (!isOverdue(t)) return false;
                if (!t.done) return true;
                if (t.completedAt) {
                    const completedDate = new Date(t.completedAt);
                    return completedDate.toDateString() === today.toDateString();
                }
                return false;
            });
            const todayDueAll = nonDailyTasks.filter(t => t.deadline && new Date(t.deadline + 'T00:00:00').toDateString() === today.toDateString());
            const todayDueDone = todayDueAll.filter(t => t.done).length;
            const upcomingAll = nonDailyTasks.filter(t => t.deadline && !isOverdue(t) && getDaysUntil(t.deadline) > 0 && getDaysUntil(t.deadline) <= 7);
            const upcomingDone = upcomingAll.filter(t => t.done).length;
            const unscheduledAll = nonDailyTasks.filter(t => !t.deadline);

        // 计算连续打卡天数
        function calculateStreak() {
            const doneTasks = db.tasks.filter(t => t.done && t.completedAt);
            if (doneTasks.length === 0) return 0;
            
            // 收集所有完成日期
            const completedDates = new Set();
            doneTasks.forEach(t => {
                const dt = new Date(t.completedAt);
                const key = `${dt.getFullYear()}-${dt.getMonth()}-${dt.getDate()}`;
                completedDates.add(key);
            });
            
            db.completedOverdueTasks.forEach(t => {
                const dt = new Date(t.solvedAt);
                const key = `${dt.getFullYear()}-${dt.getMonth()}-${dt.getDate()}`;
                completedDates.add(key);
            });
            
            // 从今天向前计算连续天数
            let streak = 0;
            let checkDate = new Date(today);
            
            for (let i = 0; i < 365; i++) {
                const key = `${checkDate.getFullYear()}-${checkDate.getMonth()}-${checkDate.getDate()}`;
                if (completedDates.has(key)) {
                    streak++;
                    checkDate.setDate(checkDate.getDate() - 1);
                } else {
                    break;
                }
            }
            
            return streak;
        }

            const nm = cM === 11 ? 0 : cM + 1, ny = cM === 11 ? cY + 1 : cY;
            function mkDay(num, mo, yr, other) { const el = document.createElement('div'); el.className = 'cday' + (other ? ' other' : ''); const key = ck(yr, mo, num); if (yr === today.getFullYear() && mo === today.getMonth() && num === today.getDate()) el.classList.add('today'); const tasks = db.calTasks[key] || []; if (tasks.length) el.classList.add('has-tasks'); const isCheckedIn = db.wordCheckins && db.wordCheckins.includes(key); if (isCheckedIn) el.classList.add('has-checkin'); const ne = document.createElement('div'); ne.className = 'cnum'; ne.textContent = num; el.appendChild(ne); if (isCheckedIn) { const cb = document.createElement('div'); cb.className = 'ccheckin'; cb.textContent = '✓'; el.appendChild(cb); } if (tasks.length) { const dd = document.createElement('div'); dd.className = 'cdots'; const uc = { 'high': 'var(--red)', 'mid': 'var(--amber)', 'low': 'var(--green)' }; tasks.slice(0, 4).forEach(t => { const d = document.createElement('div'); d.className = 'cdot'; d.style.background = uc[t.urgency] || 'var(--gray)'; dd.appendChild(d); }); el.appendChild(dd); } el.dataset.calKey = key; el.dataset.calNum = num; el.dataset.calMo = mo; el.dataset.calYr = yr; return el; }

                        dateLabel.textContent = val || '未排期';
                    });
                });
                const dateClearBtn = document.getElementById('mf-task-date-clear');
                if (dateClearBtn) {
                    dateClearBtn.addEventListener('click', () => {
                        selectedDate = '';
                        dateLabel.textContent = '未排期';
                    });
                }
                const projTrigger = document.getElementById('mf-task-proj-trigger');
                const projLabel = document.getElementById('mf-task-proj-label');
                let selectedProjId = '';
                if (projTrigger) {
                    const projItems = [{ value: '', label: '（无项目）' }, ...db.projects.map(p => ({ value: p.id, label: p.name }))];
                    projTrigger.addEventListener('click', () => {
                        openListPicker(projItems, '选择项目', selectedProjId, (val) => {
                            selectedProjId = val;
                            projLabel.textContent = projItems.find(i => i.value === val)?.label || '（无项目）';
                        });
                    });
                }
                const dailyTrigger = document.getElementById('mf-task-daily-trigger');
                const dailyLabel = document.getElementById('mf-task-daily-label');
                let selectedDaily = '0';
                if (dailyTrigger) {
                    const dailyItems = [{ value: '0', label: '否' }, { value: '1', label: '是' }];
                    dailyTrigger.addEventListener('click', () => {
                        openListPicker(dailyItems, '每日任务', selectedDaily, (val) => {
                            selectedDaily = val;
                            dailyLabel.textContent = dailyItems.find(i => i.value === val)?.label || '否';
                        });
                    });
                }
                if (type === 'edit-task' && id) { const task = db.tasks.find(t => t.id === id); if (task) { document.getElementById('mf-task-name').value = task.name; if (task.projectId) { selectedProjId = task.projectId; projLabel.textContent = getProjectName(task.projectId); } if (task.deadline) { selectedDate = task.deadline; dateLabel.textContent = task.deadline; } selectedDaily = task.daily ? '1' : '0'; dailyLabel.textContent = task.daily ? '是' : '否'; const urgBtns = document.querySelectorAll('#mb .uo'); urgBtns.forEach(b => { if (b.dataset.urg === task.urgency) { const colors = { 'high': { bg: 'var(--red-bg)', border: 'var(--red)', text: 'var(--red-t)' }, 'mid': { bg: 'var(--amber-bg)', border: 'var(--amber)', text: 'var(--amber-t)' }, 'low': { bg: 'var(--green-bg)', border: 'var(--green)', text: 'var(--green-t)' } }; const c = colors[task.urgency]; b.style.background = c.bg; b.style.borderColor = c.border; b.style.color = c.text; } }); } }
                const nameInput = document.getElementById('mf-task-name'); if (nameInput) { nameInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') { e.preventDefault(); saveModal(); } }); }
            }
            if (type === 'edit-project' && template && id) { const proj = getProject(id); if (proj) { document.getElementById('mf-proj-name').value = proj.name; document.getElementById('mf-proj-status').value = proj.status; } }
            if (type === 'note') { const textarea = document.getElementById('mf-note-content'); if (textarea) { textarea.focus(); textarea.addEventListener('keydown', function(e) { if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); saveModal(); } }); } }
        };

        window.closeModal = function() { document.getElementById('mo').classList.remove('show'); currentModalType = null; editingTaskId = null; editingProjectId = null; };
        window.closeModalOverlay = function(e) { if (e.target === document.getElementById('mo')) { document.getElementById('mo').classList.remove('show'); currentModalType = null; editingTaskId = null; editingProjectId = null; } };
        window.selectUrgency = function(btn, u) { btn.closest('.urg-sel').querySelectorAll('.uo').forEach(b => { b.className = 'uo'; }); btn.classList.add('s' + u[0]); };

        window.saveModal = function() {
            if (currentModalType === 'task' || currentModalType === 'edit-task') {
                const name = document.getElementById('mf-task-name')?.value.trim(); if (!name) { toast('请输入任务名称'); return; }
                const urgBtn = document.querySelector('#mb .uo.sh, #mb .uo.sm, #mb .uo.sl');
                const urgency = urgBtn ? (urgBtn.classList.contains('sh') ? 'high' : urgBtn.classList.contains('sm') ? 'mid' : 'low') : 'mid';
                const dateLabel = document.getElementById('mf-task-date-label');
                const deadline = dateLabel?.textContent && dateLabel.textContent !== '未排期' ? dateLabel.textContent : null;
                const projLabel = document.getElementById('mf-task-proj-label');
                const projItems = [{ value: '', label: '（无项目）' }, ...db.projects.map(p => ({ value: p.id, label: p.name }))];
                const projectId = projItems.find(i => i.label === projLabel?.textContent)?.value || null;
                const dailyLabel = document.getElementById('mf-task-daily-label');
                const daily = dailyLabel?.textContent === '是';
                if (editingTaskId) { const t = db.tasks.find(x => x.id === editingTaskId); if (t) { const oldDeadline = t.deadline; t.name = name; t.urgency = urgency; t.projectId = projectId; t.deadline = deadline; t.daily = daily; syncTaskCal(t, oldDeadline); toast('任务已更新'); } }
                else { const newTask = { id: genId(), name, urgency, projectId: projectId || editingProjectId, done: false, daily, streak: '', createdAt: new Date().toISOString(), completedAt: null, deadline }; db.tasks.push(newTask); syncTaskCal(newTask, null); toast('任务已添加'); editingProjectId = null; }
                editingTaskId = null; pendingCalKey = null; saveDB(); refreshAll(); if (selectedCalKey) { const [yr, mo, dt] = selectedCalKey.split('-'); const el = document.querySelector(`.cday[data-cal-key="${selectedCalKey}"]`); if (el) selDay(el, parseInt(dt), parseInt(mo) - 1, parseInt(yr), selectedCalKey); } closeModal();
            } else if (currentModalType === 'edit-project' && editingProjectId) { const name = document.getElementById('mf-proj-name')?.value.trim(); if (!name) { toast('请输入项目名称'); return; } const proj = getProject(editingProjectId); if (proj) { proj.name = name; proj.status = document.getElementById('mf-proj-status')?.value || proj.status; toast('项目已更新'); saveDB(); refreshAll(); } editingProjectId = null; closeModal();
            } else if (currentModalType === 'project') { const name = document.getElementById('mf-proj-name')?.value.trim(); if (!name) { toast('请输入项目名称'); return; } db.projects.push({ id: genId(), name, color: ['var(--green)', 'var(--amber)', 'var(--blue)', 'var(--purple)', 'var(--pink)', 'var(--red)'][Math.floor(Math.random() * 6)], status: document.getElementById('mf-proj-status')?.value || '未开始' }); saveDB(); refreshAll(); toast('项目已创建'); closeModal();
            } else if (currentModalType === 'note') { const content = document.getElementById('mf-note-content')?.value.trim(); if (!content && noteImages.length === 0) { toast('请输入笔记内容或添加图片'); return; } const projectId = document.getElementById('mf-note-proj')?.value || null; const proj = projectId ? getProject(projectId) : null; db.notes.unshift({ id: genId(), content: content || '', tag: proj ? '# ' + proj.name : '# 笔记', color: proj ? proj.color : 'var(--blue)', createdAt: new Date().toISOString(), projectId, images: [...noteImages] }); noteImages = []; saveDB(); refreshAll(); toast('笔记已保存'); closeModal();
            } else if (currentModalType === 'badge') { const name = document.getElementById('mf-badge-name')?.value.trim(); if (!name) { toast('请输入勋章名称'); return; } db.customAchievements.push({ id: 'custom_' + genId(), icon: document.getElementById('mf-badge-icon')?.value.trim() || '🏅', name, desc: document.getElementById('mf-badge-desc')?.value.trim() || '', condition: 'custom', unlocked: true }); saveDB(); refreshAll(); toast('勋章已添加'); closeModal(); }
        };

        function syncTaskCal(task, oldDeadline) {
            if (oldDeadline) { const oldKey = ck(new Date(oldDeadline + 'T00:00:00').getFullYear(), new Date(oldDeadline + 'T00:00:00').getMonth(), new Date(oldDeadline + 'T00:00:00').getDate()); if (db.calTasks[oldKey]) { db.calTasks[oldKey] = db.calTasks[oldKey].filter(ct => ct.taskId !== task.id); if (!db.calTasks[oldKey].length) delete db.calTasks[oldKey]; } }
            if (task.deadline) { const newKey = ck(new Date(task.deadline + 'T00:00:00').getFullYear(), new Date(task.deadline + 'T00:00:00').getMonth(), new Date(task.deadline + 'T00:00:00').getDate()); if (!db.calTasks[newKey]) db.calTasks[newKey] = []; const existing = db.calTasks[newKey].find(ct => ct.taskId === task.id); if (existing) { existing.name = task.name; existing.urgency = task.urgency; existing.done = task.done; } else { db.calTasks[newKey].push({ name: task.name, urgency: task.urgency, done: task.done, taskId: task.id }); } }
        }

        // 滚轮选择器功能
        let pCb = null, pCols = [];
        function openDatePicker(cur, cb) {
            const d = cur ? new Date(cur + 'T00:00:00') : new Date();
            pCb = cb;
            const ys = [];
            for (let y = 2024; y <= 2030; y++) ys.push(String(y));
            const ms = [];
            for (let m = 1; m <= 12; m++) ms.push(String(m).padStart(2, '0'));
            const ds = [];
            for (let d2 = 1; d2 <= 31; d2++) ds.push(String(d2).padStart(2, '0'));
            pCols = [
                { items: ys, sel: String(d.getFullYear()), unit: '年' },
                { items: ms, sel: String(d.getMonth() + 1).padStart(2, '0'), unit: '月' },
                { items: ds, sel: String(d.getDate()).padStart(2, '0'), unit: '日' }
            ];
            buildPicker('选择日期');
        }

        function buildPicker(title) {
            document.getElementById('picker-title').textContent = title;
            const body = document.getElementById('picker-body');
            body.innerHTML = '';
            const IH = 40, COL_H = 200, CENTER = COL_H / 2;

            pCols.forEach(col => {
                const colEl = document.createElement('div');
                colEl.className = 'pcol';
                colEl.appendChild(Object.assign(document.createElement('div'), { className: 'psel' }));
                const items = document.createElement('div');
                items.className = 'pitems';
                const PAD = Math.floor(CENTER / IH);
                for (let i = 0; i < PAD; i++) {
                    const ph = document.createElement('div');
                    ph.className = 'pitem';
                    items.appendChild(ph);
                }
                col.items.forEach(v => {
                    const it = document.createElement('div');
                    it.className = 'pitem';
                    it.textContent = v;
                    items.appendChild(it);
                });
                for (let i = 0; i < PAD; i++) {
                    const ph = document.createElement('div');
                    ph.className = 'pitem';
                    items.appendChild(ph);
                }
                colEl.appendChild(items);
                let curIdx = Math.max(0, col.items.indexOf(col.sel));

                function setIdx(idx, anim) {
                    idx = Math.max(0, Math.min(col.items.length - 1, idx));
                    curIdx = idx;
                    col.sel = col.items[idx];
                    const offset = CENTER - IH / 2 - idx * IH - PAD * IH;
                    items.style.transition = anim ? 'transform .2s cubic-bezier(.25,.1,.25,1)' : 'none';
                    items.style.transform = `translateY(${offset}px)`;
                    items.querySelectorAll('.pitem').forEach((el, i) => el.classList.toggle('center', i - PAD === idx));
                }

                requestAnimationFrame(() => {
                    requestAnimationFrame(() => setIdx(curIdx, false));
                });

                let sy = 0, si = 0, vel = 0, ly = 0, lt = 0, dragging = false;
                colEl.addEventListener('touchstart', e => {
                    sy = e.touches[0].clientY;
                    si = curIdx;
                    ly = sy;
                    lt = Date.now();
                    vel = 0;
                    dragging = true;
                }, { passive: true });
                colEl.addEventListener('touchmove', e => {
                    if (!dragging) return;
                    e.preventDefault();
                    const y = e.touches[0].clientY, now = Date.now();
                    vel = (ly - y) / Math.max(now - lt, 1) * 16;
                    ly = y;
                    lt = now;
                    setIdx(Math.round(si + (sy - y) / IH), false);
                }, { passive: false });
                colEl.addEventListener('touchend', () => {
                    dragging = false;
                    setIdx(curIdx + Math.round(vel), true);
                });
                items.querySelectorAll('.pitem').forEach((el, i) => {
                    if (i >= PAD && i < PAD + col.items.length) {
                        el.addEventListener('click', () => setIdx(i - PAD, true));
                    }
                });
                body.appendChild(colEl);
                const sep = document.createElement('div');
                sep.className = 'psep';
                sep.textContent = col.unit;
                body.appendChild(sep);
            });
            document.getElementById('picker-ov').classList.add('show');
        }

        document.getElementById('picker-cancel').onclick = () => {
            document.getElementById('picker-ov').classList.remove('show');
        };
        document.getElementById('picker-clear').onclick = () => {
            document.getElementById('picker-ov').classList.remove('show');
            if (pCb) pCb('');
        };
        document.getElementById('picker-confirm').onclick = () => {
            const v = pCols.map(c => c.sel);
            const res = v.length === 3 ? `${v[0]}-${v[1]}-${v[2]}` : `${v[0]}:${v[1]}`;
            document.getElementById('picker-ov').classList.remove('show');
            if (pCb) pCb(res);
        };

        // 列表选择器功能
        let lpCb = null;
        function openListPicker(items, title, selectedValue, cb) {
            lpCb = cb;
            document.getElementById('listpick-title').textContent = title;
            const list = document.getElementById('listpick-list');
            list.innerHTML = '';
            items.forEach(item => {
                const el = document.createElement('div');
                el.className = 'listpick-item' + (item.value === selectedValue ? ' selected' : '');
                el.innerHTML = `<span>${item.label}</span>${item.value === selectedValue ? '<span class="listpick-check">✓</span>' : ''}`;
                el.addEventListener('click', () => {
                    document.getElementById('listpick-ov').classList.remove('show');
                    if (lpCb) lpCb(item.value);
                });
                list.appendChild(el);
            });
            document.getElementById('listpick-ov').classList.add('show');
        }

        document.getElementById('listpick-ov').addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.remove('show');
            }
        });

        let noteImages = [];

        window.exportData = function() {
            const exportData = {
                version: '1.0',
                exportTime: new Date().toISOString(),
                projects: db.projects,
                tasks: db.tasks,
                notes: db.notes,
                achievements: db.achievements,
                customAchievements: db.customAchievements,
                completedOverdueTasks: db.completedOverdueTasks,
                calTasks: db.calTasks
            };
            
            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'journey-data-' + new Date().toISOString().split('T')[0] + '.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            toast('数据已导出');
        };

        window.importData = function() {
            document.getElementById('import-file').click();
        };

        let pendingImportData = null;
        let importFileInput = null;
        
        window.showConfirmDialog = function(title, message, callback) {
            const listpickOv = document.getElementById('listpick-ov');
            const listpickTitle = document.getElementById('listpick-title');
            const listpickList = document.getElementById('listpick-list');
            
            listpickTitle.textContent = title;
            listpickList.innerHTML = `
                <div class="listpick-msg" style="padding:16px;text-align:center;color:var(--text2);font-size:14px;">${message}</div>
                <div class="spop-it" style="text-align:center;color:var(--red);padding:16px;border-top:1px solid var(--border);" data-action="cancel">取消</div>
                <div class="spop-it" style="text-align:center;color:var(--blue);padding:16px;border-top:1px solid var(--border);" data-action="confirm">确定导入</div>
            `;
            
            listpickOv.classList.add('show');
            
            const handleClick = function(e) {
                const actionItem = e.target.closest('[data-action]');
                if (actionItem) {
                    listpickOv.classList.remove('show');
                    listpickList.removeEventListener('click', handleClick);
                    if (actionItem.dataset.action === 'confirm') {
                        callback(true);
                    } else {
                        callback(false);
                    }
                }
            };
            listpickList.addEventListener('click', handleClick);
        };
        
        window.handleFileImport = function(event) {
            importFileInput = event.target;
            const file = importFileInput.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    pendingImportData = JSON.parse(e.target.result);
                    
                    showConfirmDialog('确认导入', '导入数据会覆盖当前所有数据，确定继续吗？', function(confirmed) {
                        if (confirmed) {
                            if (pendingImportData.projects) db.projects = pendingImportData.projects;
                            if (pendingImportData.tasks) db.tasks = pendingImportData.tasks;
                            if (pendingImportData.notes) db.notes = pendingImportData.notes;
                            if (pendingImportData.achievements) db.achievements = pendingImportData.achievements;
                            if (pendingImportData.customAchievements) db.customAchievements = pendingImportData.customAchievements;
                            if (pendingImportData.completedOverdueTasks) db.completedOverdueTasks = pendingImportData.completedOverdueTasks;
                            if (pendingImportData.calTasks) db.calTasks = pendingImportData.calTasks;
                            
                            saveDB();
                            refreshAll();
                            toast('数据导入成功');
                        }
                        pendingImportData = null;
                        importFileInput.value = '';
                        importFileInput = null;
                    });
                } catch (error) {
                    toast('导入失败：文件格式错误');
                    importFileInput.value = '';
                    importFileInput = null;
                }
            };
            reader.readAsText(file);
        };

        window.addNoteImage = function() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = function(event) {
                    const base64 = event.target.result;
                    noteImages.push(base64);
                    renderNoteImages();
                };
                reader.readAsDataURL(file);
            };
            input.click();
        };

        function renderNoteImages() {
            const container = document.getElementById('mf-note-images');
            if (!container) return;
            
            container.innerHTML = '';
            noteImages.forEach((img, idx) => {
                const div = document.createElement('div');
                div.style.position = 'relative';
                div.style.display = 'inline-block';
                div.style.margin = '4px';
                div.style.width = '80px';
                div.style.height = '80px';
                div.style.borderRadius = '8px';
                div.style.overflow = 'hidden';
                div.style.border = '1px solid var(--border)';
                
                const imgEl = document.createElement('img');
                imgEl.src = img;
                imgEl.style.width = '100%';
                imgEl.style.height = '100%';
                imgEl.style.objectFit = 'cover';
                
                const delBtn = document.createElement('button');
                delBtn.textContent = '✕';
                delBtn.style.position = 'absolute';
                delBtn.style.top = '2px';
                delBtn.style.right = '2px';
                delBtn.style.width = '20px';
                delBtn.style.height = '20px';
                delBtn.style.border = 'none';
                delBtn.style.borderRadius = '50%';
                delBtn.style.background = 'rgba(0,0,0,0.6)';
                delBtn.style.color = '#fff';
                delBtn.style.fontSize = '12px';
                delBtn.style.cursor = 'pointer';
                delBtn.onclick = () => {
                    noteImages.splice(idx, 1);
                    renderNoteImages();
                };
                
                div.appendChild(imgEl);
                div.appendChild(delBtn);
                container.appendChild(div);
            });
        }

        document.addEventListener('click', function(e) {
            if (e.target.id === 'mf-note-add-image') {
                e.preventDefault();
                addNoteImage();
            }
        });

        // 为picker和listpick添加背景点击关闭
        document.getElementById('picker-ov').addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.remove('show');
            }
        });
        
        document.getElementById('listpick-ov').addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.remove('show');
            }
        });
        
        function init() { syncAllCalTasks(); checkAchievements(); refreshAll(); renderCal(); document.getElementById('cal-det').style.display = 'none'; }
        init();
    })();
    </script>
